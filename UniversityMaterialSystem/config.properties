# ========================================
#  University Material Sharing System
#  Configuration File
# ========================================

# ========================================
# DATABASE CONFIGURATION
# ========================================
# MySQL Database connection settings
db.url=jdbc:mysql://localhost:3306/university_db
db.username=root
db.password=12@one12ONE

# Database connection pool settings
db.max_connections=10
db.connection_timeout=30000

# ========================================
# SERVER CONFIGURATION
# ========================================
# TCP port for client-server communication
server.port=8888

# UDP port for notifications/broadcasts
server.udp.port=8889

# Maximum number of concurrent clients
server.max_clients=50

# Server host (leave as 0.0.0.0 to accept connections from any IP)
server.host=0.0.0.0

# ========================================
# FILE STORAGE CONFIGURATION
# ========================================
# Directory where uploaded files are stored
upload.path=uploads/

# Maximum file size in bytes (10MB = 10485760 bytes)
max.file.size=10485760

# Allowed file extensions
allowed.extensions=pdf,ppt,pptx,doc,docx,jpg,jpeg,png,gif

# ========================================
# APPLICATION SETTINGS
# ========================================
# Enable debug mode (true/false)
debug.mode=true

# Log level (DEBUG, INFO, WARNING, ERROR)
log.level=INFO

# Session timeout in minutes
session.timeout=30

# ========================================
# NOTIFICATION SETTINGS
# ========================================
# Enable UDP notifications
notifications.enabled=true

# Notification refresh rate in seconds
notification.interval=5